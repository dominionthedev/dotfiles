gui:
  scrollHeight: 3
  scrollPastBottom: true
  sidePanelWidth: 0.3333
  expandFocusedSidePanel: true
  mainPanelSplitMode: "flexible"
  border: "rounded"
  mouseEvents: true
  showFileTree: true
  showListFooter: true
  showRandomTip: true
  showNumstatInFilesView: true
  showCommandLog: true
  commandLogSize: 8
  nerdFontsVersion: "3"
  timeFormat: "02 Jan 06 15:04"
  shortTimeFormat: "15:04"
  theme:
    activeBorderColor:
      - "#cba6f7"
      - bold
    inactiveBorderColor:
      - "#a6adc8"
    searchingActiveBorderColor:
      - "#f9e2af"
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#313244"
    inactiveViewSelectedLineBgColor:
      - "#6c7086"
    cherryPickedCommitFgColor:
      - "#cba6f7"
    cherryPickedCommitBgColor:
      - "#45475a"
    markedBaseCommitFgColor:
      - "#89b4fa"
    markedBaseCommitBgColor:
      - "#f9e2af"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#cdd6f4"

  authorColors:
    "*": "#b4befe"

git:
  commit:
    signOff: false
    autoWrapCommitMessage: true
    autoWrapWidth: 72
  merging:
    manualCommit: false
  log:
    order: "topo-order"
    showGraph: "always"
  skipHookPrefix: "WIP"
  autoFetch: true
  autoRefresh: true
  overrideGpg: false
  fetchAll: true
  parseEmoji: true
  branchLogCmd: "git log --graph --color=always --abbrev-commit --decorate --date=relative --pretty=medium {{branchName}} --"
  autoForwardBranches: "onlyMainBranches"
  paging:
    colorArg: always

os:
  editPreset: "nvim-remote"

refresher:
  refreshInterval: 180

update:
  method: "prompt"
  days: 14

keybinding:
  universal:
    quit: "q"
    quit-alt1: "<c-c>"
    return: "<esc>"
    togglePanel: "<tab>"
    prevItem: "<up>"
    nextItem: "<down>"
    prevItem-alt: "k"
    nextItem-alt: "j"
    prevPage: ","
    nextPage: "."
    gotoTop: "<"
    gotoBottom: ">"
    prevBlock: "<left>"
    nextBlock: "<right>"
    prevBlock-alt: "h"
    nextBlock-alt: "l"
    scrollLeft: "H"
    scrollRight: "L"
    optionMenu: "x"
    select: "<space>"
    goInto: "<enter>"
    confirm: "<enter>"
    remove: "d"
    new: "n"
    edit: "e"
    openFile: "o"
    pushFiles: "P"
    pullFiles: "p"
    refresh: "R"
    nextTab: "]"
    prevTab: "["
    undo: "z"
    redo: "<c-z>"
    copyToClipboard: "<c-o>"
    filteringMenu: "<c-s>"
    diffingMenu: "W"
