# ── Core ─────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
setw -g aggressive-resize on
set -g extended-keys on

# stolen from https://github.com/omerxx/dotfiles
# Hack to make Shift-Enter and Ctrl-m work in tmux
# Stolen from https://github.com/listx/syscfg/blob/master/tmux/.tmux.conf
bind-key -T root         S-Enter     send-keys Escape "[13;2u"
bind-key -T root         C-m         send-keys Escape "[109;5u"

# ── Prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Config reload ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display " Config reloaded"

# ── Splits ───────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ───────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize ──────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Windows ──────────────────────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind x kill-pane
bind & kill-window
bind n next-window
bind p previous-window

# ── Vi mode ────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ── Sync panes ───────────────────────────────────────────────────────────────
bind a setw synchronize-panes

# ── Quick layouts ────────────────────────────────────────────────────────────
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

# ── Floating panes (via floax) ────────────────────────────────────────────────
# F → floating terminal
# g → floating lazygit
# e → floating yazi..to be fixed
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -b rounded \
  -S "fg=#cba6f7" -E "lazygit"
# bind e display-popup -d "#{pane_current_path}" -w 85% -h 85% -b rounded \
  -S "fg=#89b4fa" -E "yazi"
bind t display-popup -d "#{pane_current_path}" -w 75% -h 75% -b rounded \
  -S "fg=#a6e3a1" -E "$SHELL"

# ── Hooks ────────────────────────────────────────────────────────────────────
set-hook -g pane-focus-in  'run-shell "~/.config/tmux/scripts/pane-focus.sh"'
set-hook -g after-new-window  'run-shell "~/.config/tmux/scripts/new-window.sh"'
set-hook -g after-new-session 'run-shell "~/.config/tmux/scripts/new-session.sh #{session_name}"'

# ── Catppuccin Mocha palette ──────────────────────────────────────────────────
base="#1e1e2e"
surface0="#313244"
surface1="#45475a"
overlay="#585b70"
text="#cdd6f4"
subtext="#a6adc8"
mauve="#cba6f7"
blue="#89b4fa"
sapphire="#74c7ec"
sky="#89dceb"
teal="#94e2d5"
green="#a6e3a1"
yellow="#f9e2af"
peach="#fab387"
red="#f38ba8"

# ── Pane borders ─────────────────────────────────────────────────────────────
set -g pane-border-style "fg=${surface0}"
set -g pane-active-border-style "fg=${mauve}"
set -g display-panes-time 2000
set -g display-panes-colour "${overlay}"
set -g display-panes-active-colour "${mauve}"

# ── Status bar ───────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=${base} fg=${text}"
set -g status-interval 2

# Left — prefix indicator + session name
set -g status-left-length 60
set -g status-left "#[bg=${mauve},fg=${base},bold]#{?client_prefix,#[bg=${yellow}] ⌨  ,} 󰣐 #S #[bg=${base},fg=${mauve}]"

# Right — reactive status bar
# custom batter and cpu status
set -g status-right-length 200
set -g status-right "\
#{?window_zoomed_flag,#[bg=${yellow},fg=${base},bold] 󰊓 ZOOM ,}\
#[fg=${surface0}]#[bg=${surface0},fg=${sky}] #(~/.config/tmux/scripts/git-status.sh) \
#[bg=${base},fg=${surface0}]\
#[fg=${overlay}] │ \
#[fg=${blue}]#(~/.config/tmux/scripts/battery.sh) \
#[fg=${overlay}] │ \
#[fg=${green}]󰻠 #(~/.config/tmux/scripts/cpu.sh)%% \
#[fg=${overlay}] │ \
#[fg=${subtext}]%H:%M:%S \
#[fg=${overlay}] │ \
#[fg=${subtext}]%a %d %b \
#[fg=${overlay}] │ \
#[fg=${mauve}]#H "

# Window status
setw -g window-status-format         "#[fg=${overlay}] #I:#W#{?window_flags,#{window_flags}, } "
setw -g window-status-current-format "#[bg=${surface0},fg=${mauve},bold] #I:#W#{?window_flags,#{window_flags}, } "
setw -g window-status-separator      ""
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=${yellow},bold"

# ── Messages ──────────────────────────────────────────────────────────────────
set -g message-style         "bg=${mauve} fg=${base} bold"
set -g message-command-style "bg=${blue} fg=${base}"

# ── Modes ────────────────────────────────────────────────────────────────────
setw -g clock-mode-colour "${mauve}"
setw -g mode-style "bg=${mauve} fg=${base} bold"
set -g visual-bell off
set -g bell-action none

# ── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind 'a'
set -g @floax-bind-menu 'P'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'
set -g @floax-title 'float'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.tmux/plugins/tpm/tpm'

