# ── Core ─────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-features ",tmux-256color:RGB"
set -as terminal-features ",tmux-256color:kitty"
set -ga terminal-overrides ",tmux-256color:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g allow-passthrough on
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
setw -g aggressive-resize on
set -g extended-keys on

bind-key -T root         S-Enter     send-keys Escape "[13;2u"
bind-key -T root         C-m         send-keys Escape "[109;5u"

# ── Prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Config reload ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display " Config reloaded"

# ── Splits ───────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ───────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize ──────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Windows ──────────────────────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind x kill-pane
bind & kill-window
bind n next-window
bind p previous-window

# ── Vi mode ────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ── Sync panes ───────────────────────────────────────────────────────────────
bind a setw synchronize-panes

# ── Quick layouts ────────────────────────────────────────────────────────────
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

# ── Floating panes (via floax) ────────────────────────────────────────────────
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -b rounded \
  -S "fg=#cba6f7" -E "lazygit"
bind f display-popup -d "#{pane_current_path}" -w 75% -h 75% -b rounded \
  -S "fg=#a6e3a1" -E "$SHELL"

# ── Catppuccin Mocha palette ────────────────────────────────────────────────
set -g @base     "#1e1e2e"
set -g @surface0 "#313244"
set -g @surface1 "#45475a"
set -g @overlay  "#585b70"
set -g @text     "#cdd6f4"
set -g @subtext  "#a6adc8"
set -g @mauve    "#cba6f7"
set -g @blue     "#89b4fa"
set -g @sapphire "#74c7ec"
set -g @sky      "#89dceb"
set -g @teal     "#94e2d5"
set -g @green    "#a6e3a1"
set -g @yellow   "#f9e2af"
set -g @peach    "#fab387"
set -g @red      "#f38ba8"

# ── Pane borders ─────────────────────────────────────────────────────────────
set -g pane-border-style "fg=#{@surface0}"
set -g pane-active-border-style "fg=#{@mauve}"
set -g display-panes-time 2000
set -g display-panes-colour "#585b70"
set -g display-panes-active-colour "#cba6f7"

# ── Status bar ───────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#{@base} fg=#{@text}"
set -g status-interval 1

# Left — prefix indicator + session name
set -g status-left-length 60
set -g status-left "#[bg=#{@mauve},fg=#{@base},bold]#{?client_prefix,#[bg=#{@yellow}] ⌨  ,} 󰣐 #S #[bg=#{@base},fg=#{@mauve}]"

# Right — reactive status bar
set -g status-right-length 200
set -g status-right "\
#[fg=#{@surface0}]#[bg=#{@surface0},fg=#{@sky}]#($TERMBOX_DATA_DIR/scripts/tmux/git-status.sh) \
#[bg=#{@base},fg=#{@surface0}]\
#[fg=#{@overlay}] │ \
#($TERMBOX_DATA_DIR/scripts/tmux/battery.sh) \
#[fg=#{@overlay}] │ \
#($TERMBOX_DATA_DIR/scripts/tmux/cpu.sh) \
#[fg=#{@overlay}] │ \
#($TERMBOX_DATA_DIR/scripts/tmux/memory.sh) \
#[fg=#{@overlay}] │ \
#[fg=#{@teal}]%H:%M:%S \
#[fg=#{@overlay}] │ \
#[fg=#{@subtext}]%a %d %b \
#[fg=#{@overlay}] │ \
#[fg=#{@mauve}]#H "

setw -g window-status-format \
"#[fg=#{@overlay}] #I:#W#{?window_flags,#{window_flags}, } "
setw -g window-status-current-format \
"#[bg=#{@surface0},fg=#{@mauve},bold] #I:#W#{?window_flags,#{window_flags}, } "
setw -g window-status-separator ""
setw -g window-status-activity-style "fg=#{@yellow},bold"
set -g message-style         "bg=#{@mauve} fg=#{@base} bold"
set -g message-command-style "bg=#{@blue} fg=#{@base}"
setw -g clock-mode-colour "#cba6f7"
setw -g mode-style "bg=#{@mauve} fg=#{@base} bold"
set -g visual-bell off
set -g bell-action none

# ── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
run '~/.tmux/plugins/tpm/tpm'
