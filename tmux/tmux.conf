# ── Core ─────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -g allow-passthrough on
set -g mouse on
set -g cursor-style blinking-bar
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
setw -g aggressive-resize on
set -g extended-keys on

bind-key -T root         S-Enter     send-keys Escape "[13;2u"
bind-key -T root         C-m         send-keys Escape "[109;5u"

# ── Prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Config reload ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display " Config reloaded"

# ── Splits ───────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind Enter last-window
unbind '"'
unbind %

# ── Pane navigation (vim-style) ───────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize ──────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Windows ──────────────────────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind x confirm-before -p "Kill pane?" kill-pane
bind & kill-window
bind n next-window
bind p previous-window

# ── Vi mode ────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ── Sync panes ───────────────────────────────────────────────────────────────
bind a setw synchronize-panes

# ── Quick layouts ────────────────────────────────────────────────────────────
bind Space next-layout

# ── Floating panes ───────────────────────────────────────────────────────────
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -b rounded \
  -S "fg=#cba6f7" -E "lazygit"
bind f display-popup -d "#{pane_current_path}" -w 75% -h 75% -b rounded \
  -S "fg=#a6e3a1" -E "$SHELL"

# ── Wondertone Spectral Palette ────────────────────────────────────────────────
# Neutrals
set -g @base      "#1e1e2e"
set -g @surface0  "#313244"
set -g @surface1  "#45475a"
set -g @overlay   "#585b70"
set -g @dim       "#6c7086"
set -g @subtext   "#a6adc8"
set -g @text      "#cdd6f4"
set -g @crimson   "#c33551"
set -g @red       "#f38ba8"
set -g @orange    "#e75b49"
set -g @peach     "#fab387"
set -g @yellow    "#f9e2af"
set -g @dawn      "#e7b9b3"
set -g @moss      "#3ba391"
set -g @teal      "#94e2d5"
set -g @green     "#a6e3a1"
set -g @unix      "#55b04c"
set -g @cyan      "#3dc4d6"
set -g @sky       "#89dceb"
set -g @sapphire  "#74c7ec"
set -g @blue      "#89b4fa"
set -g @dblue     "#2199d6"
set -g @starlight "#2963c3"
set -g @pink      "#e6508a"
set -g @magenta   "#a072e7"
set -g @mauve     "#cba6f7"
set -g @dimpurple "#945ba2"
set -g @bloom     "#b335ce"

# ── Pane borders ─────────────────────────────────────────────────────────────
set -g pane-border-style "fg=#{@dim}"
set -g pane-active-border-style "fg=#{@dawn}"
set -g display-panes-time 2000
set -g display-panes-colour "#585b70"
set -g display-panes-active-colour "#cba6f7"

# ── Status bar ───────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#{@base},fg=#{@text}"
set -g status-interval 2

# Left pill
set -g status-left-length 80
set -g status-left "\
#[fg=#{@crimson},bg=#{@base}]\
#[fg=#{@base},bg=#{@crimson},bold]#{?client_prefix,#[fg=#{@yellow}]⌨ TMUX ,󰆍 }\
#[fg=#{@crimson},bg=#{@surface0}] #S \
#[fg=#{@surface0},bg=#{@base}]"

setw -g window-status-separator ""

setw -g window-status-format "\
#[fg=#{@dimpurple},bg=#{@surface0}]#[fg=#{@base},bg=#{@dimpurple}]#I \
#[fg=#{@dimpurple},bg=#{@surface0}] #W#{?window_flags,#{window_flags}, }\
#[fg=#{@surface0},bg=#{@base}]"

setw -g window-status-current-format "\
#[fg=#{@bloom},bg=#{@surface0}]#[fg=#{@base},bg=#{@bloom},bold]#I \
#[fg=#{@bloom},bg=#{@surface0}] #W#{?window_flags,#{window_flags}, }\
#[fg=#{@surface0},bg=#{@base}]"

setw -g window-status-activity-style "fg=#{@yellow},bold"

# Right pills
set -g status-right-length 200
set -g status-right "\
#[bg=#{@surface0}]#(./scripts/git-status.sh)\
#[bg=#{@surface0}]#(./scripts/battery.sh)  #[default]\
#[bg=#{@surface0}]#(./scripts/cpu.sh)  #[default]\
#[bg=#{@surface0}]#(./scripts/memory.sh)  #[default]\
#[bg=#{@surface0}]#(./scripts/temp.sh)  #[default]\
#[fg=#{@mauve},bg=#{@surface0}]#[fg=#{@base},bg=#{@mauve}]󰥔 #[fg=#{@mauve},bg=#{@surface0}] %H:%M  \
#[fg=#{@magenta},bg=#{@surface0}]#[fg=#{@base},bg=#{@magenta}]󰃭 #[fg=#{@magenta},bg=#{@surface0}] %a %d %b  \
#[fg=#{@pink},bg=#{@surface0}]#[fg=#{@base},bg=#{@pink}]󰒋 #[fg=#{@pink},bg=#{@surface0}] #H #[fg=#{@pink},bg=#{@surface0}]"

set -g message-style "bg=#{@overlay} fg=#{@mauve} bold"
set -g message-command-style "bg=#{@blue} fg=#{@surface1}"
setw -g clock-mode-colour "#3fe9f5"
setw -g mode-style "bg=#{@orange} fg=#{@base} bold"
set -g visual-bell off
set -g bell-action none

# ── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
run '~/.tmux/plugins/tpm/tpm'

