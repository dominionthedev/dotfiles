"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 10000
scan_timeout = 2000
add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$golang\
$rust\
$zig\
$python\
$nodejs\
$lua\
$package\
$fill\
$cmd_duration\
$jobs\
$status\
$line_break\
$custom\
$character"""

[character]
success_symbol = "[ŌØ»](bold #a6e3a1)"
error_symbol = "[ŌØ»](bold #f38ba8)"
vimcmd_symbol = "[ŌØ«](bold #cba6f7)"
vimcmd_replace_one_symbol = "[ŌØ«](bold #f9e2af)"
vimcmd_replace_symbol = "[ŌØ«](bold #f9e2af)"
vimcmd_visual_symbol = "[ŌØ«](bold #f5c2e7)"

[directory]
style = "bold #89b4fa"
read_only = " ¾░īŠ"
read_only_style = "#eba0ac"
home_symbol = "¾░ŗ× ~"
truncation_length = 4
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"~/Developer" = "dev"
"~/Documents" = "¾░łÖ "
"~/Downloads" = "¾░ēŹ "
"github/" = "’éø "
"go/src" = "¾░¤ō go"
"dotfiles" = ".dotfiles"

[git_branch]
symbol = " "
style = "bold #cba6f7"
format = "[$symbol$branch(:$remote_branch)]($style) "
truncation_length = 25
truncation_symbol = "ŌĆ”"

[git_status]
style = "#eba0ac"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "¾░®ī "
ahead = "ŌćĪ${count} "
behind = "ŌćŻ${count} "
diverged = "ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count} "
up_to_date = "[Ō£ō](bold #a6e3a1)"
untracked = "? "
stashed = "¾░ÅŚ "
modified = "! "
staged = "+ "
renamed = "¾░æĢ "
deleted = "Ō£ś "

[git_state]
format = "\\([$state( $progress_current/$progress_total)]($style)\\) "
style = "bold #f9e2af"
rebase = "REBASE"
merge = "MERGE"
revert = "REVERT"
cherry_pick = "CHERRY"
bisect = "BISECT"

[golang]
symbol = "¾░¤ō "
style = "bold #89dceb"
format = "[$symbol($version )]($style)"
detect_files = ["go.mod", "go.sum", "*.go"]

[rust]
symbol = "¾▒śŚ "
style = "bold #fab387"
format = "[$symbol($version )]($style)"
detect_files = ["Cargo.toml", "*.rs"]

[zig]
symbol = "ŅÜ® "
style = "bold #f9e2af"
format = "[$symbol($version )]($style)"
detect_files = ["build.zig", "build.zig.zon"]
detect_extensions = ["zig"]

[python]
symbol = "ŅłĄ "
style = "bold #94e2d5"
format = "[$symbol$pyenv_prefix($version )]($style)"
detect_files = ["pyproject.toml", "requirements.txt", "*.py", ".python-version"]
pyenv_version_name = false
python_binary = "python3"

[nodejs]
style = "bold #a6e3a1"
format = "[$symbol($version )]($style)"
detect_extensions = ["js", "mjs", "cjs", "ts", "mts"]

[lua]
style = "bold #89b4fa"
format = "[$symbol($version )]($style)"
lua_binary = "lua5.1"

[package]
symbol = "¾░ÅŚ "
style = "bold #f5c2e7"
format = "[$symbol$version]($style) "

[status]
symbol = "Ō£¢ "
style = "bold #f38ba8"
format = "[$symbol$status]($style) "
disabled = false

[cmd_duration]
min_time = 2_000
style = "bold #f9e2af"
format = "[¾▒”¤ $duration]($style) "

[jobs]
symbol = "¾░Ā£ "
style = "bold #f2cdcd"
format = "[$symbol$number]($style) "
number_threshold = 1

[fill]
symbol = " "

# ŌöĆŌöĆ Custom modules ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
[custom.tmux]
when = "[ -n \"$TMUX\" ]"
format = "[¾░åŹ]($style) "
style = "bold #cba6f7"

# Python virtualenv name
[custom.venv]
command = "echo $VIRTUAL_ENV_PROMPT"
when = "[ -n \"$VIRTUAL_ENV\" ]"
format = "[$output ]($style)"
style = "bold #74c7ec"
